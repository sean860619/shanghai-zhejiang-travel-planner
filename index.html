<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗺️ 上海浙江旅遊計劃板 2026</title>
<style>
:root {
  --orange:#FF6B35; --blue:#0077FF; --green:#1A936F;
  --purple:#7B2D8B; --navy:#1b2838; --teal:#00b4d8;
  --bg:#f4f5f7; --sidebar-bg:#1e2230; --card:#fff;
  --border:#e8eaed; --text:#1a1a1a; --muted:#888;
  --radius:10px; --shadow:0 2px 12px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* HEADER */
#header{background:var(--navy);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
#header h1{font-size:15px;font-weight:800;letter-spacing:.5px}
#header .meta{font-size:11px;color:#8899aa;margin-top:1px}
.header-actions{display:flex;gap:8px}
.hbtn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:.2s}
.hbtn:hover{background:rgba(255,255,255,.2)}
.hbtn.accent{background:var(--orange)}

/* LAYOUT */
#main{display:flex;flex:1;overflow:hidden}

/* LEFT SIDEBAR */
#sidebar{width:280px;flex-shrink:0;background:var(--sidebar-bg);overflow-y:auto;display:flex;flex-direction:column}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:#3a4050;border-radius:4px}
.sidebar-top{padding:14px 14px 8px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-top h2{font-size:11px;font-weight:700;color:#8899aa;letter-spacing:2px;text-transform:uppercase}
.progress-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.progress-bar{flex:1;height:4px;background:#2a3050;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--orange);border-radius:2px;transition:.4s}
.progress-text{font-size:10px;color:var(--orange);white-space:nowrap}

/* DAY ITEMS */
.day-group{border-bottom:1px solid rgba(255,255,255,.05)}
.day-header{display:flex;align-items:center;padding:10px 14px;cursor:pointer;gap:8px;user-select:none;transition:.15s}
.day-header:hover{background:rgba(255,255,255,.04)}
.day-header.active{background:rgba(255,107,53,.1)}
.day-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center}
.day-info{flex:1;min-width:0}
.day-date{font-size:11px;font-weight:700;color:#aab;white-space:nowrap}
.day-label{font-size:12px;color:#ccd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-meta{display:flex;align-items:center;gap:4px;margin-top:1px}
.day-badge{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:700}
.badge-free{background:rgba(0,119,255,.25);color:#6bb3ff}
.badge-tour{background:rgba(26,147,111,.25);color:#6bd4a8}
.badge-hot{background:rgba(255,107,53,.3);color:#ff9a70}
.day-chevron{font-size:10px;color:#556;transition:.2s}
.day-header.open .day-chevron{transform:rotate(90deg)}

.activity-list{display:none;padding:4px 0 6px}
.day-header.open + .activity-list{display:block}
.activity-item{display:flex;align-items:center;padding:6px 14px 6px 20px;gap:8px;cursor:pointer;transition:.15s}
.activity-item:hover{background:rgba(255,255,255,.04)}
.activity-item.selected{background:rgba(255,107,53,.15);border-right:3px solid var(--orange)}
.act-check{width:14px;height:14px;border:1.5px solid #3a4555;border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;transition:.15s}
.act-check.checked{background:var(--green);border-color:var(--green);color:#fff}
.act-icon{font-size:13px;flex-shrink:0;width:18px;text-align:center}
.act-body{flex:1;min-width:0}
.act-time{font-size:9px;color:#556;font-weight:700}
.act-title{font-size:11px;color:#ccd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-title.done{text-decoration:line-through;color:#556}
.act-cost{font-size:9px;color:#8899aa;white-space:nowrap}

.add-act-btn{margin:4px 14px;padding:5px;border:1px dashed #3a4555;border-radius:6px;background:none;color:#556;font-size:10px;cursor:pointer;width:calc(100% - 28px);transition:.15s}
.add-act-btn:hover{border-color:#FF6B35;color:#FF6B35}

.sidebar-footer{padding:12px 14px;border-top:1px solid rgba(255,255,255,.07)}
.add-day-btn{width:100%;padding:8px;background:rgba(255,107,53,.15);border:1px dashed rgba(255,107,53,.4);border-radius:8px;color:#ff9a70;font-size:11px;cursor:pointer;transition:.15s}
.add-day-btn:hover{background:rgba(255,107,53,.25)}

/* RIGHT CONTENT */
#content{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* TABS */
#tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);padding:0 20px;flex-shrink:0}
.tab{padding:12px 16px;border:none;background:none;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}

/* TAB CONTENT */
.tab-pane{display:none;flex:1;overflow-y:auto;padding:20px}
.tab-pane.active{display:block}
.tab-pane::-webkit-scrollbar{width:5px}
.tab-pane::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}

/* DETAIL PANEL */
#detail-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:#ccc;gap:8px}
#detail-placeholder .icon{font-size:40px}
#detail-placeholder p{font-size:13px}

.detail-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.detail-header{padding:16px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.detail-icon-title{display:flex;align-items:center;gap:10px}
.detail-icon{font-size:24px}
.detail-title{font-size:18px;font-weight:800}
.detail-subtitle{font-size:11px;color:var(--muted);margin-top:1px}
.detail-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.15s}
.icon-btn:hover{background:var(--bg)}

.detail-addr{padding:10px 20px;background:#f8f9fa;display:flex;align-items:center;gap:8px;font-size:12px;color:#555;border-top:1px solid var(--border)}
.detail-addr .addr-icon{font-size:14px}

.link-row{display:flex;gap:8px;padding:14px 20px;flex-wrap:wrap}
.link-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;border:none;transition:.15s}
.link-btn:hover{opacity:.85;transform:translateY(-1px)}
.btn-maps{background:#4285f4;color:#fff}
.btn-amap{background:#1d6fa4;color:#fff}
.btn-red{background:#ff2442;color:#fff}
.btn-book{background:var(--orange);color:#fff}
.btn-xhs{background:#ff2442;color:#fff}

.detail-sections{padding:0 20px 20px}
.section-block{margin-top:16px}
.section-title{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.tip-list{list-style:none}
.tip-list li{font-size:12px;color:#444;padding:4px 0;display:flex;gap:8px;line-height:1.5}
.tip-list li::before{content:'›';color:var(--orange);font-weight:700;flex-shrink:0}
.cost-badge{display:inline-flex;align-items:center;gap:5px;background:#f0faf5;border:1px solid #b3e8d0;border-radius:20px;padding:4px 12px;font-size:11px;color:var(--green);font-weight:700}
.highlight-badge{display:inline-flex;align-items:center;gap:5px;background:#fff5f0;border:1px solid #ffd4b3;border-radius:20px;padding:4px 12px;font-size:11px;color:var(--orange);font-weight:700}

.notes-area{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;resize:vertical;min-height:80px;font-family:inherit;color:var(--text);outline:none}
.notes-area:focus{border-color:var(--orange)}

/* HOTELS */
.hotels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.hotel-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:.2s}
.hotel-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.hotel-img{height:120px;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative}
.hotel-confirmed-badge{position:absolute;top:8px;right:8px;background:var(--green);color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px}
.hotel-arranged-badge{position:absolute;top:8px;right:8px;background:#888;color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px}
.hotel-body{padding:12px}
.hotel-city{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.hotel-name{font-size:14px;font-weight:800;margin-bottom:2px}
.hotel-nights{font-size:10px;color:var(--muted)}
.hotel-price{font-size:12px;color:var(--orange);font-weight:700;margin:6px 0}
.hotel-actions{display:flex;gap:6px;margin-top:8px}
.hotel-btn{flex:1;padding:6px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;border:none;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px;transition:.15s}
.hotel-btn:hover{opacity:.85}
.hb-book{background:var(--orange);color:#fff}
.hb-check{background:#f0f0f0;color:#555}
.hb-check.confirmed{background:#e6faf2;color:var(--green)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-h{font-size:16px;font-weight:800}
.section-sub{font-size:11px;color:var(--muted);margin-top:1px}

/* CHECKLIST */
.checklist-category{background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
.cat-title{font-size:13px;font-weight:800;display:flex;align-items:center;gap:8px}
.cat-count{font-size:10px;color:var(--muted)}
.cat-body{padding:4px 16px 12px}
.check-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5}
.check-row:last-child{border-bottom:none}
.check-box{width:16px;height:16px;border:2px solid #ddd;border-radius:4px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:.15s}
.check-box.checked{background:var(--green);border-color:var(--green);color:#fff}
.check-label{font-size:12px;flex:1}
.check-label.done{text-decoration:line-through;color:#bbb}
.check-priority{font-size:9px;padding:1px 6px;border-radius:8px;white-space:nowrap}
.p1{background:#fff0eb;color:var(--orange)}
.p2{background:#e8f0ff;color:var(--blue)}
.p3{background:#f0f0f0;color:#888}
.add-item-row{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px dashed #eee}
.add-item-input{flex:1;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;outline:none;font-family:inherit}
.add-item-input:focus{border-color:var(--orange)}
.add-item-btn{padding:5px 12px;background:var(--orange);color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer}

/* BUDGET */
.budget-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.budget-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.budget-num{font-size:22px;font-weight:900;color:var(--orange)}
.budget-label{font-size:10px;color:var(--muted);margin-top:2px}
.budget-list{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.budget-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid #f5f5f5;gap:10px}
.budget-row:last-child{border-bottom:none}
.budget-row-icon{font-size:14px;width:20px;text-align:center}
.budget-row-label{flex:1;font-size:12px}
.budget-row-amount{font-size:12px;font-weight:700;color:var(--orange)}
.budget-row-note{font-size:10px;color:var(--muted)}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
#modal-overlay.show{display:flex}
#modal{background:#fff;border-radius:14px;width:480px;max-width:90vw;max-height:80vh;overflow:hidden;display:flex;flex-direction:column}
#modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
#modal-title{font-size:15px;font-weight:800}
#modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:#888}
#modal-body{padding:16px 20px;overflow-y:auto;flex:1}
#modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.modal-btn{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:.15s}
.btn-cancel{background:#f0f0f0;color:#555}
.btn-save{background:var(--orange);color:#fff}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:#555;margin-bottom:5px;display:block}
.form-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;font-family:inherit;outline:none}
.form-input:focus{border-color:var(--orange)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>🗺️ 上海浙江旅遊計劃板 2026</h1>
    <div class="meta">6/28（六）— 7/6（日）· 9天8夜 · 高雄出發</div>
  </div>
  <div class="header-actions">
    <button class="hbtn" onclick="exportData()">⬇ 匯出資料</button>
    <button class="hbtn" onclick="resetProgress()">↺ 重設進度</button>
    <button class="hbtn accent" onclick="showModal('add-day')">+ 新增行程日</button>
  </div>
</div>

<div id="main">
  <!-- LEFT SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-top">
      <h2>行程進度</h2>
      <div class="progress-row">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-text" id="progress-text">0%</div>
      </div>
    </div>
    <div id="day-list"></div>
    <div class="sidebar-footer">
      <button class="add-day-btn" onclick="showModal('add-day')">＋ 新增行程日</button>
    </div>
  </div>

  <!-- RIGHT CONTENT -->
  <div id="content">
    <div id="tabs">
      <button class="tab active" onclick="switchTab('detail',this)">📍 景點詳情</button>
      <button class="tab" onclick="switchTab('hotels',this)">🏨 住宿清單</button>
      <button class="tab" onclick="switchTab('checklist',this)">✅ 打包清單</button>
      <button class="tab" onclick="switchTab('budget',this)">💰 旅費預算</button>
      <button class="tab" onclick="switchTab('notes',this)">📝 旅遊筆記</button>
    </div>

    <!-- 景點詳情 -->
    <div class="tab-pane active" id="pane-detail">
      <div id="detail-placeholder">
        <div class="icon">👈</div>
        <p>點擊左側景點查看詳情、地圖連結與攻略</p>
      </div>
      <div id="detail-content" style="display:none"></div>
    </div>

    <!-- 住宿清單 -->
    <div class="tab-pane" id="pane-hotels">
      <div class="section-header">
        <div>
          <div class="section-h">🏨 住宿清單</div>
          <div class="section-sub">點擊「已確認」更新入住狀態 · 6/28-6/29 需自行訂房</div>
        </div>
        <button class="hbtn accent" onclick="showModal('add-hotel')" style="font-size:11px">+ 新增住宿</button>
      </div>
      <div class="hotels-grid" id="hotels-list"></div>
    </div>

    <!-- 打包清單 -->
    <div class="tab-pane" id="pane-checklist">
      <div class="section-header">
        <div>
          <div class="section-h">✅ 出發前清單</div>
          <div class="section-sub">依優先序排列 · 勾選完成項目</div>
        </div>
        <button class="hbtn" onclick="showModal('add-check')" style="font-size:11px">+ 新增項目</button>
      </div>
      <div id="checklist-body"></div>
    </div>

    <!-- 旅費預算 -->
    <div class="tab-pane" id="pane-budget">
      <div class="section-header">
        <div>
          <div class="section-h">💰 旅費預算</div>
          <div class="section-sub">基於行程活動估算 · 實際費用依記帳更新</div>
        </div>
      </div>
      <div id="budget-body"></div>
    </div>

    <!-- 旅遊筆記 -->
    <div class="tab-pane" id="pane-notes">
      <div class="section-header">
        <div>
          <div class="section-h">📝 旅遊筆記</div>
          <div class="section-sub">各景點攻略摘要 · 小紅書內容整理</div>
        </div>
      </div>
      <div id="notes-body"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <div id="modal-header">
      <div id="modal-title">編輯</div>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
    <div id="modal-footer">
      <button class="modal-btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="modal-btn btn-save" id="modal-save-btn" onclick="saveModal()">儲存</button>
    </div>
  </div>
</div>

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let state = JSON.parse(localStorage.getItem('travel2026') || 'null') || JSON.parse(JSON.stringify(DEFAULT_DATA));
let modalMode = '';
let modalTarget = null;

function save() {
  localStorage.setItem('travel2026', JSON.stringify(state));
  updateProgress();
}

// ══════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════
function updateProgress() {
  let total = 0, done = 0;
  state.days.forEach(d => d.activities.forEach(a => { total++; if(a.done) done++; }));
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-text').textContent = pct+'%';
}

// ══════════════════════════════════════════
// RENDER SIDEBAR
// ══════════════════════════════════════════
function renderSidebar() {
  const list = document.getElementById('day-list');
  list.innerHTML = state.days.map(d => {
    const doneCnt = d.activities.filter(a=>a.done).length;
    const badge = d.type==='free' ? 'badge-free' : d.label.includes('🔥') ? 'badge-hot' : 'badge-tour';
    const badgeText = d.type==='free' ? '自由行' : '跟團';
    const isOpen = d.open;
    return `
    <div class="day-group">
      <div class="day-header ${isOpen?'open':''}" onclick="toggleDay('${d.id}',this)">
        <div class="day-icon">${d.icon}</div>
        <div class="day-info">
          <div class="day-date">${d.date}</div>
          <div class="day-label">${d.label}</div>
          <div class="day-meta">
            <span class="day-badge ${badge}">${badgeText}</span>
            <span style="font-size:9px;color:#445;margin-left:2px">${doneCnt}/${d.activities.length} 完成</span>
          </div>
        </div>
        <div class="day-chevron">▶</div>
      </div>
      <div class="activity-list">
        ${d.activities.map(a => `
          <div class="activity-item ${state.selectedActivity===a.id?'selected':''}" onclick="selectActivity('${a.id}')">
            <div class="act-check ${a.done?'checked':''}" onclick="toggleDone(event,'${a.id}')">
              ${a.done?'✓':''}
            </div>
            <div class="act-icon">${a.icon}</div>
            <div class="act-body">
              <div class="act-time">${a.time}</div>
              <div class="act-title ${a.done?'done':''}">${a.title}</div>
            </div>
            ${a.cost>0?`<div class="act-cost">NT$${a.cost}</div>`:''}
          </div>
        `).join('')}
        <button class="add-act-btn" onclick="showModal('add-activity','${d.id}')">＋ 新增景點</button>
      </div>
    </div>`;
  }).join('');
  updateProgress();
}

function toggleDay(dayId, el) {
  const d = state.days.find(x=>x.id===dayId);
  d.open = !d.open;
  save();
  renderSidebar();
}

function toggleDone(e, actId) {
  e.stopPropagation();
  for(const d of state.days) {
    const a = d.activities.find(x=>x.id===actId);
    if(a) { a.done = !a.done; break; }
  }
  save();
  renderSidebar();
  if(state.selectedActivity===actId) renderDetail(actId);
}

function selectActivity(actId) {
  state.selectedActivity = actId;
  save();
  renderSidebar();
  switchTab('detail', document.querySelector('.tab'));
  document.querySelectorAll('.tab')[0].click();
  renderDetail(actId);
}

// ══════════════════════════════════════════
// RENDER DETAIL
// ══════════════════════════════════════════
function getActivity(actId) {
  for(const d of state.days) {
    const a = d.activities.find(x=>x.id===actId);
    if(a) return a;
  }
  return null;
}

function renderDetail(actId) {
  const placeholder = document.getElementById('detail-placeholder');
  const content = document.getElementById('detail-content');
  const a = getActivity(actId);
  if(!a) { placeholder.style.display='flex'; content.style.display='none'; return; }
  placeholder.style.display='none';
  content.style.display='block';
  const mapLinks = [
    a.mapUrl ? `<a href="${a.mapUrl}" target="_blank" class="link-btn btn-maps">🗺 Google 地圖</a>` : '',
    a.amapUrl ? `<a href="${a.amapUrl}" target="_blank" class="link-btn btn-amap">📍 高德地圖</a>` : '',
    a.xhsUrl ? `<a href="${a.xhsUrl}" target="_blank" class="link-btn btn-xhs">📕 小紅書搜索</a>` : '',
  ].filter(Boolean).join('');
  const tipsList = (a.tips||[]).map(t=>`<li>${t}</li>`).join('');
  const shootList = (a.shoot||[]).map(t=>`<li>${t}</li>`).join('');
  const noteVal = (state.notes||{})[actId] || '';
  content.innerHTML = `
    <div class="detail-card">
      <div class="detail-header">
        <div class="detail-icon-title">
          <div class="detail-icon">${a.icon}</div>
          <div>
            <div class="detail-title">${a.title}</div>
            <div class="detail-subtitle">${a.time} · ${a.type==='tech'?'🤖 科技體驗':a.type==='attraction'?'🏛 景點':a.type==='transport'?'🚌 交通':a.type==='food'?'🍜 飲食':a.type==='shopping'?'🛍 購物':a.type==='culture'?'🎭 文化':'📌 活動'}</div>
          </div>
        </div>
        <div class="detail-actions">
          <button class="icon-btn" title="標記完成" onclick="toggleDone(event,'${a.id}')">${a.done?'✅':'⬜'}</button>
          <button class="icon-btn" title="編輯" onclick="showModal('edit-activity','${a.id}')">✏️</button>
        </div>
      </div>
      ${a.address ? `<div class="detail-addr"><span class="addr-icon">📍</span>${a.address}</div>` : ''}
      <div class="link-row">${mapLinks}</div>
      <div class="detail-sections">
        ${a.highlight ? '<span class="highlight-badge">🔥 爆款素材重點景點</span>' : ''}
        ${a.cost > 0 ? `<span class="cost-badge" style="margin-left:6px">💰 預估 NT$${a.cost}</span>` : '<span class="cost-badge" style="margin-left:6px">🎉 免費</span>'}
        ${tipsList ? `<div class="section-block"><div class="section-title">💡 攻略提示</div><ul class="tip-list">${tipsList}</ul></div>` : ''}
        ${shootList ? `<div class="section-block"><div class="section-title">📸 必拍鏡頭</div><ul class="tip-list">${shootList}</ul></div>` : ''}
        <div class="section-block">
          <div class="section-title">📝 我的備注</div>
          <textarea class="notes-area" placeholder="記錄想法、提醒、聯絡人..."
            onblur="saveNote('${a.id}',this.value)">${noteVal}</textarea>
        </div>
      </div>
    </div>`;
}

function saveNote(actId, val) {
  if(!state.notes) state.notes = {};
  state.notes[actId] = val;
  save();
}

function hotelBg(city) {
  const map = {'上海':'linear-gradient(135deg,#1b2838,#2a3f5f)','杭州':'linear-gradient(135deg,#1a3c2e,#2a6044)','蘭溪':'linear-gradient(135deg,#3c2a1a,#6b4a2a)','金華':'linear-gradient(135deg,#2a1a3c,#4a2a6b)','義烏':'linear-gradient(135deg,#3c1a1a,#8b3a2a)'};
  return map[city] || 'linear-gradient(135deg,#2a2a3c,#3a3a5c)';
}

function toggleHotel(hid) {
  const h = state.hotels.find(x=>x.id===hid);
  if(h) { h.confirmed = !h.confirmed; save(); renderHotels(); }
}

function renderChecklist() {
  const body = document.getElementById('checklist-body');
  body.innerHTML = state.checklist.map(cat => `
    <div class="checklist-category">
      <div class="cat-header">
        <div class="cat-title">${cat.cat}</div>
        <div class="cat-count">${cat.items.filter(i=>i.done).length}/${cat.items.length}</div>
      </div>
      <div class="cat-body">
        ${cat.items.map(item => `
          <div class="check-row">
            <div class="check-box ${item.done?'checked':''}" onclick="toggleCheck('${item.id}')">
              ${item.done?'✓':''}
            </div>
            <div class="check-label ${item.done?'done':''}">${item.label}</div>
            <span class="check-priority ${item.priority}">${{p1:'必做',p2:'建議',p3:'加分'}[item.priority]}</span>
          </div>
        `).join('')}
        <div class="add-item-row">
          <input class="add-item-input" placeholder="新增項目..." id="add-input-${cat.id}" onkeypress="if(event.key==='Enter')addCheckItem('${cat.id}')">
          <button class="add-item-btn" onclick="addCheckItem('${cat.id}')">＋</button>
        </div>
      </div>
    </div>`).join('');
}

function toggleCheck(itemId) {
  for(const cat of state.checklist) {
    const item = cat.items.find(x=>x.id===itemId);
    if(item) { item.done = !item.done; break; }
  }
  save(); renderChecklist();
}

function addCheckItem(catId) {
  const input = document.getElementById('add-input-'+catId);
  const val = input.value.trim();
  if(!val) return;
  const cat = state.checklist.find(x=>x.id===catId);
  cat.items.push({ id:'ci'+Date.now(), label:val, done:false, priority:'p3' });
  input.value = '';
  save(); renderChecklist();
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  if(el) el.classList.add('active');
  document.getElementById('pane-'+tab).classList.add('active');
  if(tab==='hotels') renderHotels();
  if(tab==='checklist') renderChecklist();
  if(tab==='budget') renderBudget();
  if(tab==='notes') renderNotesPanel();
  if(tab==='detail' && state.selectedActivity) renderDetail(state.selectedActivity);
}

// ══════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════
function showModal(mode, target) {
  modalMode = mode;
  modalTarget = target;
  const overlay = document.getElementById('modal-overlay');
  const body = document.getElementById('modal-body');
  const title = document.getElementById('modal-title');
  overlay.classList.add('show');
  if(mode==='edit-activity') {
    const a = getActivity(target);
    title.textContent = '編輯景點';
    body.innerHTML = `
      <div class="form-row">
        <div class="form-group"><label class="form-label">時間</label><input class="form-input" id="f-time" value="${a.time}"></div>
        <div class="form-group"><label class="form-label">圖示 Emoji</label><input class="form-input" id="f-icon" value="${a.icon}"></div>
      </div>
      <div class="form-group"><label class="form-label">景點名稱</label><input class="form-input" id="f-title" value="${a.title}"></div>
      <div class="form-group"><label class="form-label">地址</label><input class="form-input" id="f-address" value="${a.address||''}"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">預估費用 (NT$)</label><input class="form-input" id="f-cost" type="number" value="${a.cost}"></div>
        <div class="form-group"><label class="form-label">爆款亮點</label><select class="form-input" id="f-highlight"><option value="false" ${!a.highlight?'selected':''}>一般景點</option><option value="true" ${a.highlight?'selected':''}>🔥 爆款亮點</option></select></div>
      </div>
      <div class="form-group"><label class="form-label">攻略提示（每行一條）</label><textarea class="form-input" id="f-tips" rows="4">${(a.tips||[]).join('\n')}</textarea></div>
      <div class="form-group"><label class="form-label">必拍鏡頭（每行一條）</label><textarea class="form-input" id="f-shoot" rows="3">${(a.shoot||[]).join('\n')}</textarea></div>`;
  } else if(mode==='add-activity') {
    title.textContent = '新增景點';
    body.innerHTML = `
      <div class="form-row">
        <div class="form-group"><label class="form-label">時間</label><input class="form-input" id="f-time" placeholder="09:30"></div>
        <div class="form-group"><label class="form-label">圖示 Emoji</label><input class="form-input" id="f-icon" placeholder="🏛️"></div>
      </div>
      <div class="form-group"><label class="form-label">景點名稱 *</label><input class="form-input" id="f-title" placeholder="景點名稱"></div>
      <div class="form-group"><label class="form-label">地址</label><input class="form-input" id="f-address" placeholder="完整地址"></div>
      <div class="form-group"><label class="form-label">預估費用 (NT$)</label><input class="form-input" id="f-cost" type="number" value="0"></div>
      <div class="form-group"><label class="form-label">攻略提示（每行一條）</label><textarea class="form-input" id="f-tips" rows="3" placeholder="小提示..."></textarea></div>`;
  } else if(mode==='add-day') {
    title.textContent = '新增行程日';
    body.innerHTML = `
      <div class="form-row">
        <div class="form-group"><label class="form-label">日期 *</label><input class="form-input" id="f-date" placeholder="7/7（一）"></div>
        <div class="form-group"><label class="form-label">圖示 Emoji</label><input class="form-input" id="f-icon" value="📍"></div>
      </div>
      <div class="form-group"><label class="form-label">行程標題</label><input class="form-input" id="f-label" placeholder="行程簡述"></div>
      <div class="form-group"><label class="form-label">類型</label><select class="form-input" id="f-type"><option value="free">自由行</option><option value="tour">跟團</option></select></div>`;
  } else if(mode==='add-hotel') {
    title.textContent = '新增住宿';
    body.innerHTML = `
      <div class="form-row">
        <div class="form-group"><label class="form-label">城市</label><input class="form-input" id="f-city" placeholder="上海"></div>
        <div class="form-group"><label class="form-label">住宿日期</label><input class="form-input" id="f-nights" placeholder="6/28 - 6/30"></div>
      </div>
      <div class="form-group"><label class="form-label">飯店名稱</label><input class="form-input" id="f-name" placeholder="飯店名稱"></div>
      <div class="form-group"><label class="form-label">價格</label><input class="form-input" id="f-price" placeholder="約 NT$1,500/晚"></div>
      <div class="form-group"><label class="form-label">訂房連結</label><input class="form-input" id="f-bookUrl" placeholder="https://..."></div>
      <div class="form-group"><label class="form-label">備注提示</label><input class="form-input" id="f-tip" placeholder="位置、特色..."></div>`;
  }
}

function closeModal(e) {
  if(e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('show');
  modalMode = ''; modalTarget = null;
}

function saveModal() {
  const g = id => (document.getElementById(id)||{}).value || '';
  if(modalMode==='edit-activity') {
    const a = getActivity(modalTarget);
    if(!a) return;
    a.time = g('f-time'); a.icon = g('f-icon'); a.title = g('f-title');
    a.address = g('f-address'); a.cost = parseInt(g('f-cost'))||0;
    a.highlight = g('f-highlight')==='true';
    a.tips = g('f-tips').split('\n').filter(Boolean);
    a.shoot = g('f-shoot').split('\n').filter(Boolean);
    save(); renderSidebar(); renderDetail(modalTarget);
  } else if(modalMode==='add-activity') {
    const title = g('f-title'); if(!title) return;
    const d = state.days.find(x=>x.id===modalTarget);
    if(!d) return;
    d.activities.push({ id:'a'+Date.now(), time:g('f-time'), icon:g('f-icon')||'📍', title,
      address:g('f-address'), cost:parseInt(g('f-cost'))||0, done:false, highlight:false,
      mapUrl:'', amapUrl:'', xhsUrl:'', tips:g('f-tips').split('\n').filter(Boolean), shoot:[] });
    save(); renderSidebar();
  } else if(modalMode==='add-day') {
    const date = g('f-date'); if(!date) return;
    state.days.push({ id:'d'+Date.now(), date, label:g('f-label')||date, type:g('f-type'),
      icon:g('f-icon')||'📍', open:false, activities:[] });
    save(); renderSidebar();
  } else if(modalMode==='add-hotel') {
    state.hotels.push({ id:'h'+Date.now(), city:g('f-city'), nights:g('f-nights'),
      name:g('f-name'), emoji:'🏨', price:g('f-price'), confirmed:false,
      bookUrl:g('f-bookUrl'), tip:g('f-tip') });
    save(); renderHotels();
  }
  closeModal();
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function exportData() {
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = '上海浙江旅遊計劃_'+new Date().toLocaleDateString('zh-TW')+'.json';
  a.click();
}

function resetProgress() {
  if(!confirm('確定要重設所有打勾進度？（行程資料和備注保留）')) return;
  state.days.forEach(d=>d.activities.forEach(a=>a.done=false));
  state.checklist.forEach(cat=>cat.items.forEach(i=>i.done=false));
  state.hotels.forEach(h=>{ if(!h.bookUrl==='') h.confirmed=false; });
  save(); renderSidebar(); renderChecklist();
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
state.days[0].open = true;
renderSidebar();
updateProgress();
</script>
</body>
